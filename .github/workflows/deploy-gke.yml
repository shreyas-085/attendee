name: Deploy Attendee to GKE

# Build the image and roll it out on manual trigger only (workflow_dispatch) —
# select the main branch when running it. Auth is keyless via
# Workload Identity Federation: the gha-deploy SA + the github-pool/github-provider
# are authorized for shreyas-085/{meet_transcriber,attendee}.
# The image builds on the runner and pushes straight to Artifact Registry (same
# pattern as meet_transcriber); gha-deploy has artifactregistry.writer. Cluster-
# scoped k8s/bootstrap/ (namespace) is applied once, out of band.

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for the WIF OIDC token

env:
  PROJECT_ID: capturemeet
  IMAGE: asia-south1-docker.pkg.dev/capturemeet/attendee/attendee
  CLUSTER: meet-cluster
  ZONE: asia-south1-a
  NAMESPACE: attendee

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/948098942950/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gha-deploy@capturemeet.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Build & push image
        # Builds on the runner (BuildKit). configure-docker above authenticates the
        # daemon to GAR, so it can both pull the base and push the result. Uses the
        # public Dockerfile base default (ubuntu:22.04) — no GCP creds needed for it.
        run: |
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.ZONE }}

      - name: Apply manifests + roll out
        run: |
          # Pin this build's SHA into image tags, the bot-image CUBER_RELEASE_VERSION,
          # and the migrate Job name. `kubectl apply -f k8s/` is non-recursive, so the
          # cluster-scoped k8s/bootstrap/ (namespace) is skipped (applied once by hand).
          sed -i "s/GITSHA/${{ github.sha }}/g" k8s/*.yaml
          kubectl apply -f k8s/
          kubectl -n "$NAMESPACE" wait --for=condition=complete \
            job/attendee-migrate-${{ github.sha }} --timeout=300s
          kubectl -n "$NAMESPACE" rollout status deployment/attendee-web --timeout=300s
          kubectl -n "$NAMESPACE" rollout status deployment/attendee-worker --timeout=300s
          kubectl -n "$NAMESPACE" rollout status deployment/attendee-scheduler --timeout=300s
