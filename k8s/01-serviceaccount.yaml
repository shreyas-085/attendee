# Workload Identity: this K8s SA impersonates the GCP SA attendee-app, which holds
# secretmanager.secretAccessor (for the Secret Manager CSI sync). DB auth is via
# password over Cloud SQL private IP; GCS is via S3-interop HMAC keys — so no
# cloudsql.client / storage roles are needed here.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: attendee-app
  namespace: attendee
  annotations:
    iam.gke.io/gcp-service-account: attendee-app@capturemeet.iam.gserviceaccount.com
---
# The control plane (web/worker) creates one bot pod per meeting via the k8s API
# (LAUNCH_BOT_METHOD=kubernetes → bots/bot_pod_creator/bot_pod_creator.py). These
# are the exact verbs that code needs, scoped to the attendee namespace only.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bot-pod-creator
  namespace: attendee
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "delete", "watch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bot-pod-creator
  namespace: attendee
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: bot-pod-creator
subjects:
  - kind: ServiceAccount
    name: attendee-app
    namespace: attendee
