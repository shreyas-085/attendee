# GCP Secret Manager → CSI → synced K8s Secret `app-secrets`.
# The synced Secret MUST be named `app-secrets` — Attendee's bot launcher reads
# bot-pod secrets from a Secret named by BOT_POD_SECRETS_NAME (default
# `app-secrets`), so the control plane and bot pods share it.
# Requires the GKE Secret Manager add-on + attendee-app SA's secretmanager.secretAccessor.
# A pod must MOUNT this CSI volume for `secretObjects` to sync (see the deployments).
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: attendee-secrets
  namespace: attendee
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/capturemeet/secrets/ATTENDEE_DJANGO_SECRET_KEY/versions/latest"
        path: "DJANGO_SECRET_KEY"
      - resourceName: "projects/capturemeet/secrets/ATTENDEE_CREDENTIALS_ENCRYPTION_KEY/versions/latest"
        path: "CREDENTIALS_ENCRYPTION_KEY"
      - resourceName: "projects/capturemeet/secrets/ATTENDEE_DATABASE_URL/versions/latest"
        path: "DATABASE_URL"
  secretObjects:
    - secretName: app-secrets
      type: Opaque
      data:
        - objectName: "DJANGO_SECRET_KEY"
          key: "DJANGO_SECRET_KEY"
        - objectName: "CREDENTIALS_ENCRYPTION_KEY"
          key: "CREDENTIALS_ENCRYPTION_KEY"
        - objectName: "DATABASE_URL"
          key: "DATABASE_URL"
