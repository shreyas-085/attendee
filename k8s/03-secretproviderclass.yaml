# GCP Secret Manager → CSI file mount at /mnt/secrets-store.
# NOTE: The `app-secrets` K8s Secret that the deployments consume via `envFrom`
# (and that Attendee's bot launcher reads via BOT_POD_SECRETS_NAME) is created
# DIRECTLY from Secret Manager by `k8s/create-app-secrets.sh` — NOT via CSI
# `secretObjects`. The GKE Secret Manager add-on on this cluster reliably mounts
# secrets as files but did not sync `secretObjects` into a K8s Secret (the
# controller timed out), so we removed that block to avoid a perpetually-failing
# reconcile. The file mount below stays as defense-in-depth (harmless if unused).
# Requires: the GKE Secret Manager add-on + attendee-app SA's secretmanager.secretAccessor.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: attendee-secrets
  namespace: attendee
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/lynkk-502014/secrets/ATTENDEE_DJANGO_SECRET_KEY/versions/latest"
        path: "DJANGO_SECRET_KEY"
      - resourceName: "projects/lynkk-502014/secrets/ATTENDEE_CREDENTIALS_ENCRYPTION_KEY/versions/latest"
        path: "CREDENTIALS_ENCRYPTION_KEY"
      - resourceName: "projects/lynkk-502014/secrets/ATTENDEE_DATABASE_URL/versions/latest"
        path: "DATABASE_URL"
